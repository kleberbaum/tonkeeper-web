name: Quality
on:
    pull_request:
    push:
        branches: [main]

env:
    node-version: 20.11.1
    NODE_AUTH_TOKEN: ${{ github.token }}

permissions:
    contents: read
    packages: read

jobs:
    lint:
        name: lint
        runs-on: ubuntu-latest
        timeout-minutes: 10
        env:
            NODE_OPTIONS: --max-old-space-size=8192
        steps:
            - name: Checkout to git repository
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.node-version }}

            - name: Enable Corepack
              run: corepack enable

            - name: Yarn cache
              uses: actions/cache@v4
              with:
                  path: ./.yarn
                  key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-

            - name: Run install
              run: yarn install --immutable

            - name: Build shared packages
              run: yarn build:pkg

            - name: Run lint
              run: yarn lint

    typecheck:
        name: typecheck
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout to git repository
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.node-version }}

            - name: Enable Corepack
              run: corepack enable

            - name: Yarn cache
              uses: actions/cache@v4
              with:
                  path: ./.yarn
                  key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-

            - name: Run install
              run: yarn install --immutable

            - name: Build shared packages
              run: yarn build:pkg

            - name: Run typecheck
              run: yarn typecheck

    test:
        name: test
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout to git repository
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.node-version }}

            - name: Enable Corepack
              run: corepack enable

            - name: Yarn cache
              uses: actions/cache@v4
              with:
                  path: ./.yarn
                  key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-

            - name: Run install
              run: yarn install --immutable

            - name: Build shared packages
              run: yarn build:pkg

            - name: Run unit tests
              run: yarn test

    stylelint:
        name: stylelint
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - name: Checkout to git repository
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.node-version }}

            - name: Enable Corepack
              run: corepack enable

            - name: Yarn cache
              uses: actions/cache@v4
              with:
                  path: ./.yarn
                  key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-

            - name: Run install
              run: yarn install --immutable

            - name: Run lint:css
              run: yarn lint:css
