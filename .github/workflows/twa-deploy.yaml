name: Tonkeeper TWA Deploy

on:
    workflow_call:
        inputs:
            branch:
                description: 'Cloudflare Pages branch name to deploy to (under the tonkeeper-web project)'
                required: true
                type: string
        secrets:
            CLOUDFLARE_API_TOKEN:
                required: true
            CLOUDFLARE_ACCOUNT_ID:
                required: true
    workflow_dispatch:
        inputs:
            branch:
                description: 'Cloudflare Pages branch name to deploy to (under the tonkeeper-web project)'
                required: true
                type: string
                default: 'twa-recovery'

env:
    node-version: 20.11.1

jobs:
    twa-build:
        name: twa-build
        runs-on: ubuntu-latest
        timeout-minutes: 10

        outputs:
            deployment-url: ${{ steps.deploy.outputs.deployment-url }}
        steps:
            - name: Checkout to git repository
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.node-version }}

            - name: Enable Corepack
              run: |
                  corepack enable

            - name: Yarn cache
              uses: actions/cache@v4
              with:
                  path: ./.yarn
                  key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-

            - name: Run install
              uses: borales/actions-yarn@v5
              with:
                  cmd: install

            - name: Run build
              uses: borales/actions-yarn@v5
              with:
                  cmd: build:twa

            - name: Publish to Cloudflare Pages
              id: deploy
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command:
                      pages deploy apps/twa/dist --project-name=tonkeeper-web --branch=${{
                      inputs.branch }}

            - name: Summary
              run: |
                  echo '### Successful TWA deployment 🚀🚀🚀' >> $GITHUB_STEP_SUMMARY
                  echo 'Well done!' >> $GITHUB_STEP_SUMMARY
                  echo 'Link to test environment:' >> $GITHUB_STEP_SUMMARY
                  echo '${{ steps.deploy.outputs.pages-deployment-alias-url || steps.deploy.outputs.deployment-url }}' >> $GITHUB_STEP_SUMMARY

            - name: Comment PR
              uses: thollander/actions-comment-pull-request@v3
              if: github.event_name == 'pull_request'
              with:
                  message: |
                      ### Successful TWA deployment 🚀🚀🚀
                      Well done!
                      Link to test environment:
                      ${{ steps.deploy.outputs.pages-deployment-alias-url || steps.deploy.outputs.deployment-url }}
                  comment-tag: twa_deploy
